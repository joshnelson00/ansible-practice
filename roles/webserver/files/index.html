<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Josh's Pi Server</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 48px;
      max-width: 480px;
      width: 90%;
      text-align: center;
    }
    .pi-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #ffffff;
    }
    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 32px;
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 32px;
    }
    .stat {
      background: #111;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 16px;
    }
    .stat-label {
      font-size: 11px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .stat-value {
      font-size: 16px;
      font-weight: 500;
      color: #c8f5c8;
    }
    .badge {
      display: inline-block;
      background: #1a3a1a;
      color: #4caf50;
      border: 1px solid #2d5a2d;
      border-radius: 999px;
      font-size: 12px;
      padding: 4px 14px;
      margin-bottom: 24px;
    }
    .badge::before {
      content: '● ';
      font-size: 8px;
    }
    .footer {
      font-size: 12px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="pi-icon">🍓</div>
    <h1>Josh's Raspberry Pi</h1>
    <p class="subtitle">Provisioned with Ansible</p>
    <div class="badge">nginx running</div>
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Host</div>
        <div class="stat-value">raspberrypi</div>
      </div>
      <div class="stat">
        <div class="stat-label">Server</div>
        <div class="stat-value">nginx</div>
      </div>
      <div class="stat">
        <div class="stat-label">OS</div>
        <div class="stat-value">Debian</div>
      </div>
      <div class="stat">
        <div class="stat-label">Managed by</div>
        <div class="stat-value">Ansible</div>
      </div>
    </div>
  </div>
</body>
</html>
